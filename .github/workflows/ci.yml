name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            README.md
            docs/**/*.md

      - name: Link check (markdown)
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --verbose
            --no-progress
            --exclude-mail
            README.md
            docs/**/*.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Secrets pattern scan (basic)
        run: |
          set -euo pipefail
          echo "Checking for obvious secrets patterns..."
          ! grep -R --line-number -E "(API_KEY=|SECRET=|gho_|BEGIN PRIVATE KEY)" .
          echo "OK"
