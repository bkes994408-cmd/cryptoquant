name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Basic repo sanity
        run: |
          set -euo pipefail
          echo "Checking for obvious secrets patterns..."
          ! grep -R --line-number -E "(API_KEY=|SECRET=|gho_|BEGIN PRIVATE KEY)" .
          echo "OK"
