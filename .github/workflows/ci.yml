name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint Python (ruff)
        run: ruff check src tests

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            README.md
            docs/**/*.md

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run unit tests
        run: pytest -q

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Static security scan (bandit)
        run: bandit -q -r src

      - name: Basic secrets pattern check
        run: |
          set -euo pipefail
          ! grep -R --binary-files=without-match --line-number \
            --exclude-dir=.git \
            --exclude-dir=.github \
            -E "(API_KEY=|SECRET=|gho_|BEGIN PRIVATE KEY)" \
            .

      - name: Install gitleaks
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C "$tmp_dir" gitleaks
          sudo mv "$tmp_dir/gitleaks" /usr/local/bin/gitleaks
          rm -rf "$tmp_dir"

      - name: Gitleaks scan
        run: gitleaks detect --source . --no-git --verbose
